{% extends "base.html" %}

{% block title %}Edit Expense — Spendly{% endblock %}

{% block content %}
<div class="auth-section">
    <div class="auth-container">
        <div class="auth-header">
            <h1 class="auth-title">Edit expense</h1>
            <p class="auth-subtitle">Update your expense details</p>
        </div>

        <div class="auth-card">
            {% if error %}
            <p class="auth-error">{{ error }}</p>
            {% endif %}

            <form method="POST" action="{{ url_for('edit_expense', id=expense['id']) }}">
                <div class="form-group">
                    <label for="amount">Amount (Rs)</label>
                    <input class="form-input" type="number" step="0.01" min="0.01"
                           id="amount" name="amount"
                           value="{{ amount }}" placeholder="0.00" required>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select class="form-input" id="category" name="category" required>
                        <option value="" disabled {% if not category %}selected{% endif %}>Select a category</option>
                        {% for c in categories %}
                        <option value="{{ c }}" {% if category == c %}selected{% endif %}>{{ c }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input class="form-input" type="date" id="date" name="date"
                           value="{{ date }}" required>
                </div>

                <div class="form-group">
                    <label for="description">Description <span class="label-optional">(optional)</span></label>
                    <textarea class="form-input" id="description" name="description"
                              rows="2" placeholder="What was this for?">{{ description or '' }}</textarea>
                </div>

                <button type="submit" class="btn-submit">Save changes</button>
            </form>
        </div>

        <p class="auth-switch">
            <a href="{{ url_for('profile') }}">← Back to profile</a>
        </p>
    </div>
</div>
{% endblock %}
